<h3>Agregar:</h3>
<input type="text" class="form-control " placeholder="Nombre" [value]="nombre()" (input)="nombre.set(textNombre.value)" #textNombre>
<input type="number" class="form-control mt-2 " placeholder="Poder" [value]="numero()" (input)="numero.set(+textNumero.value)" #textNumero>
<input type="button" (click)="agregarPersonaje()" class="btn btn-primary mt-2 " value="Crear">
